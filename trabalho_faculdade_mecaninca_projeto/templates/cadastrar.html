<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="container">
    <h1>Cadastrar Cliente</h1>

    <form method="POST">
        <label for="nome">Nome do cliente</label>
        <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>

        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(83) 9 9999-9999" required>

        <label for="modelo_carro">Modelo do carro</label>
        <input type="text" id="modelo_carro" name="modelo_carro" placeholder="Ex: Gol 2015" required>

        <label for="problema">Problema ou suspeita do cliente</label>
        <textarea id="problema" name="problema" rows="4" placeholder="Ex: Barulho no motor, freio ruim, carro não liga..." required></textarea>

        <label for="data">Data do atendimento</label>
        <input type="date" id="data" name="data" required>

        <label for="horario">Horário</label>
        <input type="time" id="horario" name="horario" required>

        <label for="valor">Valor do serviço (R$)</label>
        <input type="number" id="valor" name="valor" placeholder="Ex: 150.00" min="0" step="0.01" required>

        <label for="pagamento">Forma de pagamento</label>
        <select id="pagamento" name="pagamento" required>
            <option value="">Selecione</option>
            <option>Dinheiro</option>
            <option>Pix</option>
            <option>Cartão</option>
        </select>

        <button type="submit">Salvar</button>
    </form>

    <br>
    <a href="/">Voltar</a>
</div>
<script>
document.getElementById("telefone").addEventListener("input", function(e) {
    let valor = e.target.value.replace(/\D/g, "");

    if (valor.length > 11) valor = valor.slice(0, 11);

    if (valor.length > 0) {
        valor = "(" + valor;
    }
    if (valor.length > 3) {
        valor = valor.slice(0, 3) + ") " + valor.slice(3);
    }
    if (valor.length > 10) {
        valor = valor.slice(0, 10) + "-" + valor.slice(10);
    }

    e.target.value = valor;
});
</script>
